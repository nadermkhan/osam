name: Nightly

on:
  schedule:
    # Run at 3 AM UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer
  PROJECT_NAME: Osam
  SCHEME: Osam

jobs:
  nightly-build:
    name: Nightly Build & Full Test
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "${{ env.DEVELOPER_DIR }}"

      - name: Build Release
        run: |
          set -o pipefail
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty --color

      - name: Run all tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5" \
            -derivedDataPath DerivedData \
            -enableCodeCoverage YES \
            -resultBundlePath NightlyResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Build for iPad
        run: |
          set -o pipefail
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=17.5" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty --color || true

      - name: Memory analysis
        run: |
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "### Nightly Build Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            SIZE=$(du -sh "$APP_PATH" | awk '{print $1}')
            echo "📦 **App Size:** $SIZE" >> $GITHUB_STEP_SUMMARY

            # Count swift files and lines
            SWIFT_FILES=$(find Osam/ -name "*.swift" | wc -l | tr -d ' ')
            SWIFT_LINES=$(find Osam/ -name "*.swift" | xargs wc -l | tail -1 | awk '{print $1}')
            echo "📝 **Swift Files:** $SWIFT_FILES" >> $GITHUB_STEP_SUMMARY
            echo "📏 **Total Lines:** $SWIFT_LINES" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload nightly results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ github.run_number }}
          path: NightlyResults.xcresult
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly build failed! Check the logs."
