name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
      build_number:
        description: 'Build number'
        required: true

env:
  DEVELOPER_DIR: /Applications/Xcode_15.4.app/Contents/Developer
  PROJECT_NAME: Osam
  SCHEME: Osam

jobs:
  # ──────────────────────────────────────
  # Validate
  # ──────────────────────────────────────
  validate:
    name: Pre-release Validation
    runs-on: macos-14
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            # Auto-increment build from tag count
            BUILD=$(git tag -l 'v*' | wc -l | tr -d ' ')
          else
            VERSION="${{ github.event.inputs.version }}"
            BUILD="${{ github.event.inputs.build_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION ($BUILD)"

      - name: Validate tag matches Info.plist
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"

  # ──────────────────────────────────────
  # Build Archive
  # ──────────────────────────────────────
  archive:
    name: Archive
    runs-on: macos-14
    timeout-minutes: 45
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "${{ env.DEVELOPER_DIR }}"

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set version and build number
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          BUILD="${{ needs.validate.outputs.build_number }}"

          # Update Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
            "${{ env.PROJECT_NAME }}/Info.plist" 2>/dev/null || \
          agvtool new-marketing-version $VERSION

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" \
            "${{ env.PROJECT_NAME }}/Info.plist" 2>/dev/null || \
          agvtool new-version -all $BUILD

          echo "Set version to $VERSION ($BUILD)"

      - name: Archive
        run: |
          set -o pipefail

          xcodebuild archive \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath $RUNNER_TEMP/${{ env.PROJECT_NAME }}.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>destination</key>
              <string>upload</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/${{ env.PROJECT_NAME }}.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/Export \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: osam-${{ needs.validate.outputs.version }}-ipa
          path: ${{ runner.temp }}/Export/*.ipa
          retention-days: 90

      - name: Upload dSYMs
        uses: actions/upload-artifact@v4
        with:
          name: osam-${{ needs.validate.outputs.version }}-dsyms
          path: ${{ runner.temp }}/${{ env.PROJECT_NAME }}.xcarchive/dSYMs/
          retention-days: 180

  # ──────────────────────────────────────
  # Upload to App Store Connect
  # ──────────────────────────────────────
  upload:
    name: Upload to App Store Connect
    runs-on: macos-14
    timeout-minutes: 30
    needs: [validate, archive]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: osam-${{ needs.validate.outputs.version }}-ipa
          path: ${{ runner.temp }}/ipa

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY }}
        run: |
          # Write API key
          mkdir -p ~/.private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_CONTENT" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          IPA_PATH=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Notify upload success
        run: |
          echo "### 🚀 Uploaded to App Store Connect" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Build: ${{ needs.validate.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, archive]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: osam-${{ needs.validate.outputs.version }}-ipa
          path: release-artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Osam v${{ needs.validate.outputs.version }}
          body: |
            ## Osam v${{ needs.validate.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Install
            This build has been submitted to App Store Connect for TestFlight / App Store distribution.
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, 'beta') || contains(needs.validate.outputs.version, 'rc') }}
